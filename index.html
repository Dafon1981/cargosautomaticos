<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor de Paquetes</title>
    
    <!-- Librerías necesarias -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Nueva librería para crear tablas en el PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 15px; }
        
        /* Pantalla de Búsqueda Manual */
        #pantalla-busqueda { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; text-align: center; }
        #pantalla-busqueda h1 { color: #f1c40f; margin-bottom: 20px; font-size: 24px; }
        .input-busqueda { width: 100%; max-width: 300px; padding: 15px; border-radius: 8px; border: 2px solid #555; background: #1a1a1a; color: #fff; font-size: 18px; text-align: center; margin-bottom: 15px; outline: none; text-transform: uppercase; }
        .input-busqueda:focus { border-color: #3498db; }
        .btn-buscar { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; }
        
        /* Pantalla de Resultados */
        #pantalla-resultados { display: none; flex-direction: column; height: 95vh; }
        
        .header-paquete { background: #1a1a1a; padding: 15px; border-radius: 10px; border-left: 5px solid #f1c40f; margin-bottom: 15px; }
        .header-paquete h1 { color: #f1c40f; font-size: 26px; margin-bottom: 5px; }
        .header-paquete h2 { color: #ccc; font-size: 14px; font-weight: normal; }
        .header-paquete .badge { background: #3498db; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-left: 10px; }

        .buscador-registros { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; margin-bottom: 15px; outline: none; }
        .buscador-registros:focus { border-color: #f1c40f; }

        /* Tabla de Registros (Estilo Excel ) */
        .tabla-contenedor { flex-grow: 1; overflow-y: auto; background: #1a1a1a; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #333; color: #f1c40f; padding: 12px; position: sticky; top: 0; z-index: 1; font-size: 14px; border-bottom: 2px solid #555; }
        td { padding: 10px 12px; border-bottom: 1px solid #444; color: #ddd; font-size: 13px; }
        tr:hover { background: #2a2a2a; }
        .col-nro { width: 40px; text-align: center; font-weight: bold; color: #888; }
        .col-fua { font-weight: bold; color: #fff; }
        .col-fecha { color: #3498db; white-space: nowrap; }

        /* Botones de Acción */
        .botones-accion { display: flex; flex-direction: column; gap: 10px; }
        .btn-accion { padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; border: none; cursor: pointer; text-align: center; }
        .btn-excel { background: #2ecc71; color: #000; }
        .btn-pdf { background: #e74c3c; color: #fff; }
        .btn-reset { background: #555; color: #fff; margin-top: 10px; }

        /* Loader */
        #loader { display: none; text-align: center; color: #f1c40f; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- PANTALLA 1: Búsqueda Manual -->
    <div id="pantalla-busqueda">
        <h1>📦 Visor de Paquetes</h1>
        <p style="color: #aaa; margin-bottom: 20px; font-size: 14px;">Escanea un QR o ingresa el código manualmente</p>
        <input type="text" id="input-paquete" class="input-busqueda" placeholder="Ej: PQR000010">
        <button class="btn-buscar" onclick="buscarPaqueteManual()">Buscar Paquete</button>
        <div id="loader">Buscando en la base de datos...</div>
    </div>

    <!-- PANTALLA 2: Resultados del Paquete -->
    <div id="pantalla-resultados">
        <div class="header-paquete">
            <h1 id="titulo-paquete">CARGANDO...</h1>
            <h2>Asignado a: <strong id="titulo-asignado" style="color: #fff;">-</strong> <span class="badge" id="badge-cantidad">0</span></h2>
        </div>

        <input type="text" id="buscador-filtro" class="buscador-registros" placeholder="🔍 Buscar FUA o Paciente..." onkeyup="filtrarRegistros()">

        <!-- NUEVO DISEÑO: Tabla estilo Excel -->
        <div class="tabla-contenedor">
            <table id="tabla-registros">
                <thead>
                    <tr>
                        <th class="col-nro">Nro</th>
                        <th>FUA</th>
                        <th>Paciente</th>
                        <th>Fecha Atención</th>
                    </tr>
                </thead>
                <tbody id="contenedor-lista">
                    <!-- Los registros se llenarán aquí -->
                </tbody>
            </table>
        </div>

        <div class="botones-accion">
            <button class="btn-accion btn-excel" onclick="descargarExcelMovil()">📊 Descargar Excel (Cargo)</button>
            <button class="btn-accion btn-pdf" onclick="descargarPdfMovil()">🖨️ Descargar PDF (Cargo)</button>
            <button class="btn-accion btn-reset" onclick="volverABuscar()">🔍 Buscar otro paquete</button>
        </div>
    </div>

<script>
    // Conexión a tu Supabase
    const supabaseUrl = 'https://esiklpxyectbekxvajnw.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzaWtscHh5ZWN0YmVreHZham53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2OTI1MjEsImV4cCI6MjA3NzI2ODUyMX0.mtQnqUrTmhmN1DQxOAUnGpizhYZobStHDH0cz_XfKGU';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

    let registrosActuales = [];
    let paqueteActual = "";
    let responsableActual = "";
    let fechaAuditoriaActual = "";

    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const paqueteUrl = urlParams.get('paquete');
        
        if (paqueteUrl) {
            cargarDatosPaquete(paqueteUrl.toUpperCase());
        }
    });

    function buscarPaqueteManual() {
        const input = document.getElementById('input-paquete').value.trim().toUpperCase();
        if (!input) return alert("Ingresa un número de paquete");
        cargarDatosPaquete(input);
    }

    async function cargarDatosPaquete(paquete) {
        document.getElementById('loader').style.display = 'block';
        
        try {
            const { data, error } = await supabase
                .from('registros')
                .select('*')
                .eq('NomPaquete', paquete)
                .order('FecAte', { ascending: true });

            if (error) throw error;

            if (!data || data.length === 0) {
                document.getElementById('loader').style.display = 'none';
                return alert(`No se encontraron registros para el paquete ${paquete}`);
            }

            registrosActuales = data;
            paqueteActual = paquete;
            responsableActual = data[0].Resp_Aud_Digi || "Sin asignar";
            fechaAuditoriaActual = data[0].FechaAuditoria || new Date().toISOString().split('T')[0];

            document.getElementById('titulo-paquete').innerText = paquete;
            document.getElementById('titulo-asignado').innerText = responsableActual;
            document.getElementById('badge-cantidad').innerText = data.length + " FUAs";

            renderizarLista(data);

            document.getElementById('pantalla-busqueda').style.display = 'none';
            document.getElementById('pantalla-resultados').style.display = 'flex';

        } catch (err) {
            alert("Error al conectar con la base de datos: " + err.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    // NUEVA FUNCIÓN: Renderiza filas de tabla en lugar de tarjetas
    function renderizarLista(datos) {
        const contenedor = document.getElementById('contenedor-lista');
        contenedor.innerHTML = '';

        if (datos.length === 0) {
            contenedor.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888; padding:20px;">No hay coincidencias</td></tr>';
            return;
        }

        datos.forEach((reg, index) => {
            contenedor.innerHTML += `
                <tr>
                    <td class="col-nro">${index + 1}</td>
                    <td class="col-fua">${reg.Nfua || ''}</td>
                    <td>${reg.PACIENTE || ''}</td>
                    <td class="col-fecha">${reg.FecAte || ''}</td>
                </tr>
            `;
        });
    }

    function filtrarRegistros() {
        const texto = document.getElementById('buscador-filtro').value.toLowerCase();
        const filtrados = registrosActuales.filter(reg => 
            (reg.Nfua && reg.Nfua.toLowerCase().includes(texto)) || 
            (reg.PACIENTE && reg.PACIENTE.toLowerCase().includes(texto))
        );
        renderizarLista(filtrados);
    }

    function volverABuscar() {
        document.getElementById('pantalla-resultados').style.display = 'none';
        document.getElementById('pantalla-busqueda').style.display = 'flex';
        document.getElementById('input-paquete').value = '';
        window.history.pushState({}, document.title, window.location.pathname);
    }

    // --- DESCARGA EXCEL (Intacta) ---
    function descargarExcelMovil() {
        const wsData = [];
        
        wsData.push([{ v: "CARGO DE ENTREGA DE FUAS", s: { font: { bold: true, sz: 14 }, alignment: { horizontal: "center" } } }]);
        wsData.push([]);
        wsData.push([{ v: "Paquete:", s: { font: { bold: true } } }, { v: paqueteActual }]);
        wsData.push([{ v: "Recepcionista:", s: { font: { bold: true } } }, { v: "Manuel Andres Da'fonseca Irribarri" }]);
        wsData.push([{ v: "Asignado a:", s: { font: { bold: true } } }, { v: responsableActual }]);
        wsData.push([{ v: "Fecha Asignación:", s: { font: { bold: true } } }, { v: fechaAuditoriaActual }]);
        wsData.push([]);

        let headers = ["Nro", "FUA", "Paciente", "Fecha de Atención"];
        const headerRow = headers.map(h => ({ v: h, s: { font: { bold: true, color: { rgb: "000000" } }, fill: { fgColor: { rgb: "D9D9D9" } }, alignment: { horizontal: "center" } } }));
        wsData.push(headerRow);

        registrosActuales.forEach((row, index) => {
            wsData.push([
                { v: index + 1 },
                { v: row.Nfua },
                { v: row.PACIENTE },
                { v: row.FecAte }
            ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!cols'] = [{ wch: 5 }, { wch: 15 }, { wch: 35 }, { wch: 18 }];
        ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: headers.length - 1 } }];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Cargo");
        XLSX.writeFile(wb, `Cargo_${paqueteActual}.xlsx`);
    }

    // --- NUEVA DESCARGA PDF (Cargo en formato Tabla) ---
    function descargarPdfMovil() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        
        // Título principal
        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.text("CARGO DE ENTREGA DE FUAS", 105, 15, { align: "center" });
        
        // Datos de cabecera
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(`Paquete: ${paqueteActual}`, 14, 25);
        doc.text(`Recepcionista: Manuel Andres Da'fonseca Irribarri`, 14, 31);
        doc.text(`Asignado a: ${responsableActual}`, 14, 37);
        doc.text(`Fecha Asignación: ${fechaAuditoriaActual}`, 14, 43);
        
        // Preparar datos para la tabla
        const tableColumn = ["Nro", "FUA", "Paciente", "Fecha de Atención"];
        const tableRows = [];
        
        registrosActuales.forEach((row, index) => {
            const rowData = [
                index + 1,
                row.Nfua || '',
                row.PACIENTE || '',
                row.FecAte || ''
            ];
            tableRows.push(rowData);
        });
        
        // Generar tabla en el PDF usando autotable
        doc.autoTable({
            startY: 50,
            head: [tableColumn],
            body: tableRows,
            theme: 'grid',
            headStyles: { fillColor: [79, 129, 189], textColor: 255, fontStyle: 'bold', halign: 'center' },
            columnStyles: {
                0: { halign: 'center', cellWidth: 15 },
                1: { cellWidth: 35 },
                2: { cellWidth: 'auto' },
                3: { cellWidth: 35, halign: 'center' }
            },
            styles: { fontSize: 9 }
        });
        
        doc.save(`Cargo_${paqueteActual}.pdf`);
    }
</script>
</body>
</html>
